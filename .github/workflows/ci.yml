name: validate-skill

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator deps
        run: pip install pyyaml
      - name: Validate SKILL.md (frontmatter, name==dir, description<=1024, ref paths, no binaries)
        run: python scripts/validate_skill.py
      - name: Trigger coverage (heuristic, informational)
        run: python scripts/eval_trigger.py
      - name: Skill resolves via the skills CLI
        run: npx -y skills add . --list
